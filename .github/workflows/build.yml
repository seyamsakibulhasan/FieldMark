name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Decode debug keystore (fallback, for signed release if provided)
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_B64" ]; then
            echo "Decoding release keystore from secret..."
            mkdir -p app/keystore
            echo "$DEBUG_KEYSTORE_B64" | base64 -d > app/keystore/release.jks
            echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
          else
            echo "No keystore secret provided — release build will be signed with debug key."
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace --warning-mode=summary

      - name: Build Release APK
        env:
          HAS_KEYSTORE: ${{ env.HAS_KEYSTORE }}
        run: |
          if [ "$HAS_KEYSTORE" = "true" ]; then
            gradle :app:assembleRelease --no-daemon --stacktrace --warning-mode=summary
          else
            gradle :app:assembleRelease -Pandroid.injected.signing.store.file= -Pandroid.injected.signing.key.alias= -Pandroid.injected.signing.store.password= -Pandroid.injected.signing.key.password= --no-daemon --stacktrace --warning-mode=summary || true
          fi

      - name: Collect APKs
        id: collect
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/FieldMark-debug.apk 2>/dev/null || true
          cp app/build/outputs/apk/release/app-release.apk dist/FieldMark-release.apk 2>/dev/null || true
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FieldMark-APK
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
